# ╔══════════════════════════════════════════════════════════════════════╗
# ║   PSD SEO Automation — GitHub Actions Workflow                      ║
# ║                                                                      ║
# ║  Secrets needed (Settings → Secrets and variables → Actions):       ║
# ║    GOOGLE_CLIENT_ID       OAuth2 client ID                          ║
# ║    GOOGLE_CLIENT_SECRET   OAuth2 client secret                      ║
# ║    GOOGLE_REFRESH_TOKEN   OAuth2 refresh token                      ║
# ║    GDRIVE_PSD_FOLDER      GDrive root folder ID (subfolders=cats)   ║
# ║    SCOPE                  ModelScope API token                      ║
# ║  (GITHUB_TOKEN is provided automatically — no need to add it)       ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: PSD SEO Automation

on:
  # ── Manual trigger with optional file limit ──────────────────────────
  workflow_dispatch:
    inputs:
      max_files:
        description: 'Max new files to process (0 = unlimited)'
        required: false
        default: '0'

  # ── Scheduled: runs daily at 2 AM UTC ────────────────────────────────
  schedule:
    - cron: '0 2 * * *'

# Give the workflow write access to push designs.xlsx back to the repo
permissions:
  contents: write

jobs:
  process-psds:
    name: Scan GDrive → ModelScope AI → Push designs.xlsx
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6-hour cap (large folders can take a while)

    steps:
      # ── 1. Checkout repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 3.11 ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pandas \
            openpyxl \
            Pillow \
            requests \
            psd-tools \
            google-api-python-client \
            google-auth \
            google-auth-oauthlib \
            openai

      # ── 4. Run the headless pipeline ──────────────────────────────────
      - name: Run PSD SEO pipeline
        env:
          # Google Drive OAuth2 (refresh token — no browser needed)
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

          # Google Drive folder that contains your category subfolders
          GDRIVE_PSD_FOLDER:    ${{ secrets.GDRIVE_PSD_FOLDER }}

          # GitHub push token (auto-provided — no manual secret needed)
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:          ${{ github.repository }}

          # ModelScope API token (Qwen-VL vision + SEO)
          SCOPE:                ${{ secrets.SCOPE }}

          # Limit files per run (0 = unlimited; set via manual trigger or hardcode here)
          MAX_FILES:            ${{ github.event.inputs.max_files || '0' }}

        run: python github_action.py
