# ╔══════════════════════════════════════════════════════════════════════╗
# ║   Tamil PSD Marketplace — GitHub Actions Workflow                   ║
# ║                                                                      ║
# ║  Repo this workflow lives in : moorthiguru33/backend-sample          ║
# ║  Preview images upload to    : backend-sample/preview_image/         ║
# ║  designs.xlsx pushed to      : moorthiguru33/Gurumoorthi             ║
# ║                                                                      ║
# ║  Supported file types        : .psd  .psb  .tiff  .tif  .png        ║
# ║                                                                      ║
# ║  Required Secrets (Settings → Secrets → Actions):                   ║
# ║    GOOGLE_CLIENT_ID      Google OAuth2 client ID                    ║
# ║    GOOGLE_CLIENT_SECRET  Google OAuth2 client secret                ║
# ║    GOOGLE_REFRESH_TOKEN  OAuth2 refresh token (one-time setup)      ║
# ║    GDRIVE_PSD_FOLDER     GDrive folder ID — source files folder     ║
# ║    GDRIVE_UPLOAD_FOLDER  GDrive folder ID — ZIP destination folder  ║
# ║    SCOPE                 ModelScope API token                       ║
# ║    GH_PAT                GitHub PAT (repo scope, access both repos) ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Tamil PSD/PNG Pipeline

on:
  workflow_dispatch:
    inputs:
      file_count:
        description: >
          How many files (PSD/TIFF/PNG) to process this run.
          10  = process 10 files.
          100 = process 100 files.
          0   = use default (50 files).
        required: false
        default: '0'

  schedule:
    - cron: '0 */6 * * *'

  # ── Also run on push to main (optional — remove if not needed) ────────────
  # push:
  #   branches: [ main ]

jobs:
  psd-pipeline:
    name: Process PSD/PNG Designs
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 5h 50m — GH Actions hard limit is 6h

    # Write permission needed to commit preview images to this repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout this repo (backend-sample) ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Cache pip packages ───────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-psd-v1
          restore-keys: |
            ${{ runner.os }}-pip-psd-

      # ── 4. Install dependencies ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            psd-tools \
            Pillow \
            pandas \
            openpyxl \
            requests

      # ── 5. Pull latest state (avoid push conflicts) ──────────────────────────
      - name: Pull latest state
        run: git pull origin main || true

      # ── 6. Run the pipeline ─────────────────────────────────────────────────
      - name: Run Tamil PSD Pipeline
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GDRIVE_PSD_FOLDER:    ${{ secrets.GDRIVE_PSD_FOLDER }}
          GDRIVE_UPLOAD_FOLDER: ${{ secrets.GDRIVE_UPLOAD_FOLDER }}
          SCOPE:                ${{ secrets.SCOPE }}
          SCOPE2:               ${{ secrets.SCOPE2 }}
          SCOPE3:               ${{ secrets.SCOPE3 }}
          GH_PAT:               ${{ secrets.GH_PAT }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          FILE_COUNT:           ${{ github.event.inputs.file_count || '0' }}
        run: python github_action.py

      # ── 7. Commit and push WebP preview images ───────────────────────────────
      # FIX: github_action.py now saves WebP files locally to preview_image/.
      # This step commits them to the repo so they are reliably persisted,
      # even if the per-file GitHub API upload (secondary) failed or was rate-limited.
      - name: Commit preview images to repo
        if: always()
        run: |
          git config user.name  "PSD-Bot"
          git config user.email "psdbot@automation.local"
          git add preview_image/ 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "ci: add preview images $(date '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push origin main || true

      # ── 8. Summary ──────────────────────────────────────────────────────────
      - name: Print summary
        if: always()
        run: |
          echo "## Tamil PSD/PNG Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Run completed at: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- Supported types: .psd  .psb  .tiff  .tif  .png" >> $GITHUB_STEP_SUMMARY
          echo "- Preview images: \`backend-sample/preview_image/\`" >> $GITHUB_STEP_SUMMARY
          echo "- CDN base: \`https://cdn.jsdelivr.net/gh/moorthiguru33/backend-sample@main/preview_image/\`" >> $GITHUB_STEP_SUMMARY
          echo "- designs.xlsx: \`moorthiguru33/Gurumoorthi/designs.xlsx\`" >> $GITHUB_STEP_SUMMARY
          WEBP_COUNT=$(find preview_image/ -name "*.webp" 2>/dev/null | wc -l)
          echo "- Total WebP files in repo: $WEBP_COUNT" >> $GITHUB_STEP_SUMMARY
