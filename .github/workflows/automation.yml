name: PSD Automation Pipeline

on:
  # ── Only runs when you manually click "Run workflow" ─────────────────────
  # Schedule and auto self-trigger REMOVED to prevent duplicate uploads.
  # To run: GitHub → Actions → PSD Automation Pipeline → Run workflow
  workflow_dispatch:
    inputs:
      item_limit:
        description: >
          How many items to download and upload this run.
          1    = process exactly 1 file.
          100  = process exactly 100 files.
          0    = process everything pending (stops when done - no auto restart).
        required: false
        default: '50'

concurrency:
  group: psd-automation
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unrar-free p7zip-full libmagic1

      - name: Pull latest state
        run: git pull origin main || true

      - name: Run automation
        env:
          FORPSD_COOKIE:         ${{ secrets.FORPSD_COOKIE }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GDRIVE_PSD_FOLDER:     ${{ secrets.GDRIVE_PSD_FOLDER }}
          RUN_MINUTES: "330"
          PAGE_LIMIT:  "0"
          ITEM_LIMIT:  ${{ github.event.inputs.item_limit || '50' }}
        run: python scripts/main.py

      - name: Save state to repo
        if: always()
        run: |
          git config user.name  "PSD-Bot"
          git config user.email "psdbot@automation.local"
          git add state.json automation.log rename_log.xlsx jobs.xlsx 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "🤖 Progress: $(date '+%Y-%m-%d %H:%M UTC')"
          git push origin main || true

      - name: Print summary
        if: always()
        run: |
          echo "## PSD Automation Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Run completed at: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- Item limit: ${{ github.event.inputs.item_limit || '50' }}" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️  Auto-schedule DISABLED — manual run only" >> $GITHUB_STEP_SUMMARY
